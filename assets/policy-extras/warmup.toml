# Built-in IP warmup schedule presets for policy-extras/warmup.lua
#
# These define *infrastructure volume ramps* for dedicated sending IPs.
# They are not a substitute for list hygiene, authentication (SPF/DKIM/DMARC),
# engagement quality, or provider monitoring (Google Postmaster, Microsoft SNDS).
#
# Operators should copy/override via their own warmup.toml; ship this file
# as the community/default layer (same pattern as shaping.toml).
#
# Each schedule key is the warmup day number (1 = warmup_start date).
# Values are either:
#   - integer daily message limit (helper formats throttle with max_burst)
#   - full throttle spec string, e.g. "500/day,max_burst=1"

# Which schedule to use when a source does not set `schedule`
default_schedule = "conservative"

# Global defaults (per-source settings can override some of these)
timezone = "UTC"
active_sending_hours = 12
max_burst = 1
# When true, hourly selection rate is derived from daily / active_sending_hours
apply_hourly_spread = true
# When false (default), sources complete warmup after the last schedule day
hold_final_day = false
# If warmup_start is in the future: "day1" uses day-1 limits; "block" uses 0/day
before_start_behavior = "day1"

# ---------------------------------------------------------------------------
# conservative (~30 days) — default for new dedicated IPs on permission lists
# Roughly aligned with industry dedicated-IP ramp guidance (order of magnitude).
# ---------------------------------------------------------------------------
